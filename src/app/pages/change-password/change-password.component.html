<div class="header bg-primary py-7 py-lg-8">
  <div class="container">
    <div class="header-body text-center mb-7">
      <div class="row justify-content-center">
        <div class="col-lg-5 col-md-6">
          <h1 class="text-white">Change Password</h1>
          <p class="text-lead text-light">Please update your password to continue.</p>
        </div>
      </div>
    </div>
  </div>
  <div class="separator separator-bottom separator-skew zindex-100">
    <svg x="0" y="0" viewBox="0 0 2560 100" preserveAspectRatio="none" version="1.1" xmlns="http://www.w3.org/2000/svg">
      <polygon class="fill-default" points="2560 0 2560 100 0 100"></polygon>
    </svg>
  </div>
</div>

<div class="container mt--8 pb-5">
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">
      <div class="card bg-secondary shadow border-0">
        <div class="card-body px-lg-5 py-lg-5">
          <div class="text-center text-muted mb-4">
            <h2>First-time Login</h2>
            <p class="mb-0">Set a new password for your account.</p>
          </div>

          <!-- Error Alert -->
          <div *ngIf="error" class="alert alert-danger">
            {{ error }}
          </div>

          <form [formGroup]="changePasswordForm" (ngSubmit)="onSubmit()">
            <div class="form-group mb-3">
              <div class="input-group input-group-alternative">
                <div class="input-group-prepend">
                  <span class="input-group-text"><i class="ni ni-lock-circle-open"></i></span>
                </div>
                <input
                  class="form-control"
                  placeholder="Current password"
                  type="password"
                  formControlName="oldPassword"
                  [ngClass]="{ 'is-invalid': submitted && f['oldPassword'].errors }">
              </div>
              <div *ngIf="submitted && f['oldPassword'].errors" class="invalid-feedback d-block">
                <div *ngIf="f['oldPassword'].errors['required']">Current password is required</div>
              </div>
            </div>

            <div class="form-group mb-3">
              <div class="input-group input-group-alternative">
                <div class="input-group-prepend">
                  <span class="input-group-text"><i class="ni ni-lock-circle-open"></i></span>
                </div>
                <input
                  class="form-control"
                  placeholder="New password"
                  type="password"
                  formControlName="newPassword"
                  [ngClass]="{ 'is-invalid': submitted && f['newPassword'].errors }">
              </div>
              <div *ngIf="submitted && f['newPassword'].errors" class="invalid-feedback d-block">
                <div *ngIf="f['newPassword'].errors['required']">New password is required</div>
              </div>
            </div>

            <div class="form-group mb-4">
              <div class="input-group input-group-alternative">
                <div class="input-group-prepend">
                  <span class="input-group-text"><i class="ni ni-lock-circle-open"></i></span>
                </div>
                <input
                  class="form-control"
                  placeholder="Repeat new password"
                  type="password"
                  formControlName="repeatPassword"
                  [ngClass]="{ 'is-invalid': submitted && (f['repeatPassword'].errors || changePasswordForm.errors?.passwordsMismatch) }">
              </div>
              <div *ngIf="submitted && (f['repeatPassword'].errors || changePasswordForm.errors?.passwordsMismatch)" class="invalid-feedback d-block">
                <div *ngIf="f['repeatPassword'].errors?.['required']">Please confirm your new password</div>
                <div *ngIf="changePasswordForm.errors?.passwordsMismatch">Passwords do not match</div>
              </div>
            </div>

            <div class="text-center">
              <button
                type="submit"
                class="btn btn-primary my-4"
                [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm mr-2"></span>
                Change Password
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
